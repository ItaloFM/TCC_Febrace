<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cérebro Falante</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="corpo">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container-fluid px-4">

            <a class="navbar-brand d-flex align-items-center gap-3" href="#">

                <!-- LOGO -->
                <img 
                    src="imgs/cerebrofalante.png" 
                    alt="Logo Cérebro Falante"
                    width="55"
                    class="logoNav"
                >

                <!-- TEXTO -->
                <span class="tituloNav">
                    Cérebro Falante
                </span>

            </a>

        </div>
    </nav>

    <!-- CONTEÚDO -->
    <main class="container-fluid vh-100 d-flex justify-content-center align-items-center">

        <div class="cardPrincipal text-center p-4">

            <h1 class="titulo mb-3">
                Exercício de Fala
            </h1>

            <p class="subtitulo mb-4">
                Pressione o microfone e leia a frase em voz alta
            </p>

            <!-- FRASE -->
            <div class="fraseBox mb-4">
                <p id="frase">
                    Clique no microfone para começar
                </p>
            </div>

            <!-- BOTÃO MICROFONE -->
            <button class="botaomic" id="botaoMic">
                <img src="imgs/iconMicBranco.png" alt="Microfone">
            </button>

            <!-- NÍVEL -->
            <div class="nivel mt-4">
                <span id="nivelTexto">Nível: Fácil</span>
            </div>

        </div>

    </main>

    <!-- JS -->
    <script src="script.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
